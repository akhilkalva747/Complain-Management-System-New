# Application Configuration
spring.application.name=complaint-management-system

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/querysolve
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Server Configuration
server.port=8080

# CORS Configuration (for React frontend on port 3000)
app.cors.allowed-origins=http://localhost:3000

# JWT Configuration
app.jwt.secret=ComplaintMgmtSystem2024SecretKey!XyZ9876543210ABCDEFabcdef
app.jwt.expiration=86400000
